<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Para Você ❤️</title>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:500px;
}

h1{
color:#ff4d6d;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

#mensagem{
margin-top:20px;
font-size:18px;
display:none;
}

</style>

</head>

<body>

<div class="card">

<h1>Oi amor ❤️</h1>

<p>Eu fiz uma coisinha pra você...</p>

<button onclick="mostrar()">Clique aqui</button>

<p id="mensagem">
Desde que você entrou na minha vida, tudo ficou mais bonito.  
Você é meu lugar favorito no mundo. 💖  
Feliz por ter você comigo. 
  Amo-te 💖
</p>

</div>

<script>

function mostrar(){
document.getElementById("mensagem").style.display="block";
}

</script>

</body>
</html>
